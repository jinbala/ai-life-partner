services:
  ai-life-partner:
    build: .
    container_name: ai-life-partner
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据目录
      - ./data:/app/data
      # 持久化环境变量
      - ./.env.docker/.env:/app/.env
      # 挂载编译后的代码（开发用）
      - ./dist:/app/dist
      # 挂载 public 目录（静态文件）
      - ./public:/app/public
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
