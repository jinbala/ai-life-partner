<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 外置大脑</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 600px;
      height: 80vh;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .chat-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .chat-header p {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 5px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
      align-items: flex-start;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin-right: 10px;
    }

    .message.user .message-avatar {
      background: #e9ecef;
      margin-left: 10px;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.assistant .message-content {
      background: white;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .chat-input-container {
      padding: 20px;
      background: white;
      border-top: 1px solid #e9ecef;
    }

    .chat-input-wrapper {
      display: flex;
      gap: 10px;
    }

    #messageInput {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    #messageInput:focus {
      border-color: #667eea;
    }

    #sendBtn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #sendBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    #sendBtn:active {
      transform: translateY(0);
    }

    #sendBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #adb5bd;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .command-list {
      margin-top: 10px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .command-list details {
      cursor: pointer;
    }

    .command-list summary {
      color: #667eea;
      font-weight: 500;
    }

    .command-list ul {
      margin-top: 10px;
      margin-left: 20px;
    }

    .command-list li {
      margin: 5px 0;
      color: #666;
    }

    .command-list code {
      background: #e9ecef;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }

    .nav-link {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.3s;
    }

    .nav-link:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <a href="/viz" class="nav-link">📊 数据中心</a>
    <div class="chat-header">
      <h1>🤖 AI 人生合伙人</h1>
      <p>用第一性原理驱动的进化式人生助手</p>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          你好！我是你的 AI 人生合伙人。<br><br>
          我可以帮你：<br>
          • 分析决策，拆解底层逻辑<br>
          • 制定目标，追踪执行进度<br>
          • 日常复盘，持续进化<br><br>
          有什么想聊的吗？
          <div class="command-list">
            <details>
              <summary>📖 可用命令</summary>
              <ul>
                <li><code>/help</code> - 显示帮助</li>
                <li><code>/goals</code> - 查看目标</li>
                <li><code>/tasks</code> - 查看任务</li>
                <li><code>/portrait</code> - 查看画像</li>
                <li><code>/add-task</code> - 添加任务</li>
              </ul>
            </details>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-input-container">
      <div class="chat-input-wrapper">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn">发送</button>
      </div>
    </div>
  </div>

  <script>
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // 生成用户 ID（本地存储）
    function getUserId() {
      let userId = localStorage.getItem('ai_partner_user_id');
      if (!userId) {
        userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('ai_partner_user_id', userId);
      }
      return userId;
    }

    // 获取认证令牌
    function getToken() {
      return localStorage.getItem('ai_partner_token') || '';
    }

    // 自动获取令牌（如果还没有）
    async function ensureToken() {
      if (!getToken()) {
        try {
          const userId = getUserId();
          const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId }),
          });
          const result = await response.json();
          if (result.success) {
            localStorage.setItem('ai_partner_token', result.data.accessToken);
            localStorage.setItem('ai_partner_refresh_token', result.data.refreshToken);
            console.log('[Auth] 自动获取令牌成功');
          }
        } catch (error) {
          console.error('[Auth] 自动获取令牌失败:', error);
        }
      }
    }

    // 生成会话 ID（本地存储）
    function getSessionId() {
      let sessionId = localStorage.getItem('ai_partner_session_id');
      if (!sessionId) {
        sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('ai_partner_session_id', sessionId);
      }
      return sessionId;
    }

    // 添加消息到聊天
    function addMessage(content, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

      messageDiv.innerHTML = `
        <div class="message-avatar">${isUser ? '👤' : '🤖'}</div>
        <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
      `;

      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 显示输入指示器
    function showTypingIndicator() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 移除输入指示器
    function removeTypingIndicator() {
      const typingDiv = document.getElementById('typingIndicator');
      if (typingDiv) {
        typingDiv.remove();
      }
    }

    // 发送消息
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      // 禁用输入
      messageInput.disabled = true;
      sendBtn.disabled = true;

      // 显示用户消息
      addMessage(message, true);
      messageInput.value = '';

      // 显示输入指示器
      showTypingIndicator();

      try {
        // 发送到聊天 API
        const token = getToken();
        const response = await fetch('/chat/api/message', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
          },
          body: JSON.stringify({
            userId: getUserId(),
            sessionId: getSessionId(),
            message: message,
          }),
        });

        const data = await response.json();
        removeTypingIndicator();

        if (data.success) {
          addMessage(data.data.message, false);
        } else {
          addMessage(`错误：${data.error?.message || data.error}`, false);
        }
      } catch (error) {
        removeTypingIndicator();
        addMessage(`请求失败：${error.message}`, false);
      } finally {
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    // 事件监听
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // 页面加载时获取令牌
    ensureToken();

    // 页面加载完成后聚焦输入框
    messageInput.focus();
  </script>
</body>
</html>
