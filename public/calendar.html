<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日历日记 - AI 人生合伙人</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.5rem; }
    .header-nav a {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 0.9rem;
      margin-left: 10px;
    }
    .calendar-container { padding: 30px; }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .calendar-nav button {
      padding: 8px 16px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-left: 5px;
    }
    .calendar-nav button:hover { background: #5568d3; }
    .quick-jump input {
      padding: 8px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-left: 10px;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .calendar-day-header {
      text-align: center;
      padding: 10px;
      font-weight: 600;
      color: #666;
      font-size: 0.9rem;
    }
    .calendar-day {
      aspect-ratio: 1;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      font-weight: 500;
      position: relative;
      transition: all 0.3s;
    }
    .calendar-day:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102,126,234,0.2);
    }
    .calendar-day.today {
      border-color: #667eea;
      background: rgba(102,126,234,0.1);
      font-weight: 700;
    }
    .calendar-day.has-entry { border-color: #28a745; }
    .calendar-day.has-entry::after {
      content: '';
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: #28a745;
      border-radius: 50%;
    }
    .calendar-day.other-month {
      background: #f8f9fa;
      color: #adb5bd;
      cursor: default;
    }
    .calendar-day.other-month:hover {
      border-color: #e9ecef;
      box-shadow: none;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 1.2rem; }
    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }
    .day-detail {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #e9ecef;
    }
    .day-detail:last-child { border-bottom: none; }
    .day-detail h4 {
      font-size: 0.95rem;
      color: #667eea;
      margin-bottom: 10px;
    }
    .mood-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .mood-option {
      width: 40px;
      height: 40px;
      border: 2px solid #e9ecef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: all 0.3s;
    }
    .mood-option:hover {
      border-color: #667eea;
      transform: scale(1.1);
    }
    .mood-option.selected {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102,126,234,0.15) 0%, rgba(118,75,162,0.15) 100%);
    }
    .word-count {
      font-size: 0.8rem;
      color: #999;
      text-align: right;
      margin-top: 5px;
    }
    textarea {
      width: 100%;
      min-height: 150px;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
    }
    textarea:focus { border-color: #667eea; outline: none; }
    .entry-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .entry-actions button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }
    .btn-delete {
      background: #dc3545;
      color: white;
    }
    .btn-cancel {
      background: #6c757d;
      color: white;
    }
    .task-list, .conversation-list {
      list-style: none;
      padding: 0;
    }
    .task-list li {
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .task-list li::before {
      content: '✅';
      font-size: 0.9rem;
    }
    .conversation-list li {
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .conversation-list li.user { border-left: 3px solid #667eea; }
    .conversation-list li.assistant { border-left: 3px solid #28a745; }
    .conversation-list .role {
      font-weight: 600;
      margin-right: 8px;
    }
    .conversation-list .role.user { color: #667eea; }
    .conversation-list .role.assistant { color: #28a745; }
    .empty-tip {
      color: #999;
      font-size: 0.9rem;
      font-style: italic;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    /* Mobile Responsive */
    @media (max-width: 768px) {
      body { padding: 10px; }
      .header { padding: 15px 20px; }
      .header h1 { font-size: 1.2rem; }
      .header-nav a { padding: 6px 12px; font-size: 0.8rem; }
      .calendar-container { padding: 15px; }
      .calendar-header h2 { font-size: 1.2rem; }
      .calendar-nav button { padding: 6px 10px; font-size: 0.85rem; }
      .calendar-day { min-height: 50px; padding: 5px; }
      .calendar-day-number { font-size: 0.9rem; }
      .modal { width: 95%; }
      .entry-actions { flex-direction: column; }
      .entry-actions button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📅 日历日记</h1>
      <div class="header-nav">
        <a href="/chat">💬 聊天</a>
        <a href="/viz">📊 数据</a>
      </div>
    </div>
    <div class="calendar-container">
      <div class="calendar-header">
        <h2 id="monthTitle"></h2>
        <div class="calendar-nav">
          <button onclick="prevMonth()">← 上月</button>
          <button onclick="goToday()">今天</button>
          <button onclick="nextMonth()">下月 →</button>
          <input type="date" class="quick-jump" id="datePicker" onchange="goToDate(this.value)" />
        </div>
      </div>
      <div class="calendar-grid" id="calendar">
        <div class="calendar-day-header">日</div>
        <div class="calendar-day-header">一</div>
        <div class="calendar-day-header">二</div>
        <div class="calendar-day-header">三</div>
        <div class="calendar-day-header">四</div>
        <div class="calendar-day-header">五</div>
        <div class="calendar-day-header">六</div>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">日记</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalContent">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>
  <script>
    console.log('[Calendar] 页面初始化');
    let currentDate = new Date();
    let selectedDate = null;
    let token = null;
    let entries = {};

    // 获取令牌
    function getToken() {
      return localStorage.getItem('ai_partner_token') || '';
    }

    // 自动获取令牌
    async function ensureToken() {
      if (!getToken()) {
        const userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        try {
          const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId }),
          });
          const result = await response.json();
          if (result.success) {
            localStorage.setItem('ai_partner_token', result.data.accessToken);
            token = result.data.accessToken;
          }
        } catch (error) {
          console.error('获取令牌失败:', error);
        }
      } else {
        token = getToken();
      }
    }

    // 渲染日历
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
      document.getElementById('monthTitle').textContent = `${year}年 ${monthNames[month]}`;

      const cal = document.getElementById('calendar');
      // 清除旧日期（保留星期标题）
      cal.querySelectorAll('.calendar-day').forEach(d => d.remove());

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const firstDayOfWeek = firstDay.getDay();
      const totalDays = lastDay.getDate();
      const prevMonthLastDay = new Date(year, month, 0).getDate();
      const today = new Date();
      const todayStr = formatDate(today);

      // 上个月日期
      for (let i = firstDayOfWeek - 1; i >= 0; i--) {
        const day = prevMonthLastDay - i;
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.textContent = day;
        cal.appendChild(dayDiv);
      }

      // 当月日期
      for (let day = 1; day <= totalDays; day++) {
        const date = new Date(year, month, day);
        const dateStr = formatDate(date);
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';

        if (dateStr === todayStr) dayDiv.classList.add('today');
        if (entries[dateStr]) dayDiv.classList.add('has-entry');

        dayDiv.textContent = day;
        dayDiv.onclick = () => openDayModal(date);
        cal.appendChild(dayDiv);
      }

      // 下个月日期
      const remaining = 42 - (firstDayOfWeek + totalDays);
      for (let day = 1; day <= remaining; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.textContent = day;
        cal.appendChild(dayDiv);
      }
    }

    // 格式化日期
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // 切换月份
    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      loadEntries();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      loadEntries();
    }

    function goToday() {
      currentDate = new Date();
      document.getElementById('datePicker').value = formatDate(currentDate);
      loadEntries();
    }

    function goToDate(dateStr) {
      if (!dateStr) return;
      const date = new Date(dateStr);
      currentDate = date;
      renderCalendar();
      openDayModal(date);
    }

    // 加载日记条目
    async function loadEntries() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      console.log('[Calendar] 加载日历数据:', { year, month });

      try {
        const response = await fetch(`/api/calendar/entries?year=${year}&month=${month}`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });

        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        const result = await response.json();
        console.log('[Calendar] API 响应:', result);

        if (result.success) {
          entries = result.data.entries;
          console.log('[Calendar] 日记条目:', Object.keys(entries).length);
        }
        renderCalendar();
      } catch (error) {
        console.error('加载日记失败:', error);
        entries = {};
        renderCalendar();
      }
    }

    // 打开日期弹窗
    async function openDayModal(date) {
      selectedDate = date;
      const dateStr = formatDate(date);
      const modal = document.getElementById('modal');
      const modalContent = document.getElementById('modalContent');
      const modalTitle = document.getElementById('modalTitle');

      modalTitle.textContent = dateStr + ' 的日记';
      modal.classList.add('active');
      modalContent.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch('/api/calendar/entry/' + dateStr, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });

        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        const result = await response.json();

        if (result.success) {
          const entry = result.data.entry;
          const completedTasks = result.data.completedTasks || [];
          const conversations = result.data.conversations || [];

          let html = '';

          // 完成任务列表
          html += '<div class="day-detail">';
          html += '<h4>✅ 完成的任务</h4>';
          if (completedTasks.length > 0) {
            html += '<ul class="task-list">';
            completedTasks.forEach(task => {
              html += '<li>' + escapeHtml(task.description) + '</li>';
            });
            html += '</ul>';
          } else {
            html += '<p class="empty-tip">今天没有完成任何任务</p>';
          }
          html += '</div>';

          // 日记内容
          html += '<div class="day-detail">';
          html += '<h4>📝 日记</h4>';

          // 情绪选择器
          html += '<div class="mood-selector">';
          html += '<div class="mood-option" data-mood="great" onclick="selectMood(this)">😊</div>';
          html += '<div class="mood-option" data-mood="good" onclick="selectMood(this)">🙂</div>';
          html += '<div class="mood-option" data-mood="neutral" onclick="selectMood(this)">😐</div>';
          html += '<div class="mood-option" data-mood="bad" onclick="selectMood(this)">😔</div>';
          html += '<div class="mood-option" data-mood="terrible" onclick="selectMood(this)">😫</div>';
          html += '</div>';
          html += '<div class="word-count">字数：<span id="wordCount">0</span></div>';

          if (entry) {
            html += '<textarea id="entryTextarea" oninput="updateWordCount()">' + escapeHtml(entry.content) + '</textarea>';
            // 初始化情绪选择
            if (entry.mood) {
              setTimeout(function() {
                const moodOption = document.querySelector('.mood-option[data-mood="' + entry.mood + '"]');
                if (moodOption) moodOption.classList.add('selected');
              }, 100);
            }
          } else {
            html += '<textarea id="entryTextarea" placeholder="写下今天的记录..." oninput="updateWordCount()"></textarea>';
            html += '<p style="color:#999;font-size:0.85rem;margin-top:8px;">每日 23:00 自动生成总结，也可手动编辑</p>';
          }
          html += '</div>';

          // 对话历史
          html += '<div class="day-detail">';
          html += '<h4>💬 对话历史</h4>';
          if (conversations.length > 0) {
            html += '<ul class="conversation-list">';
            conversations.forEach(conv => {
              const roleClass = conv.role === 'user' ? 'user' : 'assistant';
              const roleName = conv.role === 'user' ? '我' : 'AI';
              html += '<li class="' + roleClass + '"><span class="role ' + roleClass + '">' + roleName + ':</span>' + escapeHtml(conv.content) + '</li>';
            });
            html += '</ul>';
          } else {
            html += '<p class="empty-tip">今天没有对话</p>';
          }
          html += '</div>';

          // 操作按钮
          html += '<div class="entry-actions">';
          html += '<button class="btn-save" onclick="saveEntry(\'' + dateStr + '\')">💾 保存日记</button>';
          if (entry) {
            html += '<button class="btn-delete" onclick="deleteEntry(\'' + dateStr + '\')">🗑️ 删除</button>';
          }
          html += '<button class="btn-cancel" onclick="closeModal()">取消</button>';
          html += '</div>';

          modalContent.innerHTML = html;
        } else {
          // 没有数据也显示编辑界面
          const completedTasks = result.data?.completedTasks || [];
          const conversations = result.data?.conversations || [];

          let html = '';

          html += '<div class="day-detail"><h4>✅ 完成的任务</h4>';
          if (completedTasks.length > 0) {
            html += '<ul class="task-list">';
            completedTasks.forEach(task => {
              html += '<li>' + escapeHtml(task.description) + '</li>';
            });
            html += '</ul>';
          } else {
            html += '<p class="empty-tip">今天没有完成任何任务</p>';
          }
          html += '</div>';

          html += '<div class="day-detail"><h4>📝 日记</h4>';
          html += '<div class="mood-selector">';
          html += '<div class="mood-option" data-mood="great" onclick="selectMood(this)">😊</div>';
          html += '<div class="mood-option" data-mood="good" onclick="selectMood(this)">🙂</div>';
          html += '<div class="mood-option" data-mood="neutral" onclick="selectMood(this)">😐</div>';
          html += '<div class="mood-option" data-mood="bad" onclick="selectMood(this)">😔</div>';
          html += '<div class="mood-option" data-mood="terrible" onclick="selectMood(this)">😫</div>';
          html += '</div>';
          html += '<div class="word-count">字数：<span id="wordCount">0</span></div>';
          html += '<textarea id="entryTextarea" placeholder="写下今天的记录..." oninput="updateWordCount()"></textarea>';
          html += '</div>';

          html += '<div class="day-detail"><h4>💬 对话历史</h4>';
          if (conversations.length > 0) {
            html += '<ul class="conversation-list">';
            conversations.forEach(conv => {
              const roleClass = conv.role === 'user' ? 'user' : 'assistant';
              const roleName = conv.role === 'user' ? '我' : 'AI';
              html += '<li class="' + roleClass + '"><span class="role ' + roleClass + '">' + roleName + ':</span>' + escapeHtml(conv.content) + '</li>';
            });
            html += '</ul>';
          } else {
            html += '<p class="empty-tip">今天没有对话</p>';
          }
          html += '</div>';

          html += '<div class="entry-actions">';
          html += '<button class="btn-save" onclick="saveEntry(\'' + dateStr + '\')">💾 保存日记</button>';
          html += '<button class="btn-cancel" onclick="closeModal()">取消</button>';
          html += '</div>';

          modalContent.innerHTML = html;
        }
      } catch (error) {
        console.error('加载日历详情失败:', error);
        modalContent.innerHTML = '<div class="empty-state"><p style="color:#f44336;">加载失败：' + escapeHtml(error.message) + '</p><button class="btn-cancel" onclick="closeModal()" style="margin-top:15px;">关闭</button></div>';
      }
    }

    // 选择情绪
    function selectMood(element) {
      document.querySelectorAll('.mood-option').forEach(function(opt) { opt.classList.remove('selected'); });
      element.classList.add('selected');
    }

    // 更新字数统计
    function updateWordCount() {
      const textarea = document.getElementById('entryTextarea');
      const countSpan = document.getElementById('wordCount');
      if (textarea && countSpan) {
        countSpan.textContent = textarea.value.length;
      }
    }

    // 保存日记
    async function saveEntry(dateStr) {
      const textarea = document.getElementById('entryTextarea');
      const content = textarea.value.trim();

      if (!content) {
        alert('请输入日记内容');
        return;
      }

      // 获取选中的情绪
      const selectedMood = document.querySelector('.mood-option.selected');
      const mood = selectedMood ? selectedMood.getAttribute('data-mood') : null;

      try {
        const response = await fetch('/api/calendar/entry/' + dateStr, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
          },
          body: JSON.stringify({ content, mood }),
        });
        const result = await response.json();

        if (result.success) {
          alert('保存成功！');
          entries[dateStr] = result.data.entry;
          renderCalendar();
          openDayModal(selectedDate);
        } else {
          alert('保存失败：' + (result.error?.message || '未知错误'));
        }
      } catch (error) {
        alert('保存失败：' + error.message);
      }
    }

    // 删除日记
    async function deleteEntry(dateStr) {
      if (!confirm('确定要删除这篇日记吗？')) return;

      try {
        const response = await fetch('/api/calendar/entry/' + dateStr, {
          method: 'DELETE',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
        const result = await response.json();

        if (result.success) {
          alert('删除成功！');
          delete entries[dateStr];
          renderCalendar();
          closeModal();
        } else {
          alert('删除失败：' + (result.error?.message || '未知错误'));
        }
      } catch (error) {
        alert('删除失败：' + error.message);
      }
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      selectedDate = null;
    }

    // 转义 HTML
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 点击遮罩层关闭
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === e.currentTarget) {
        closeModal();
      }
    });

    // 键盘关闭
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // 初始化
    ensureToken().then(function() {
      console.log('[Calendar] Token 初始化完成');
      const datePicker = document.getElementById('datePicker');
      if (datePicker) {
        datePicker.value = formatDate(new Date());
        datePicker.max = formatDate(new Date());
      }
      loadEntries();
    });
  </script>
</body>
</html>
