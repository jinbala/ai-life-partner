<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日历日记 - AI 人生合伙人</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .header-nav a {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 0.9rem;
      margin-left: 10px;
      transition: background 0.3s;
    }

    .header-nav a:hover {
      background: rgba(255,255,255,0.3);
    }

    .calendar-container {
      padding: 30px;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calendar-header h2 {
      font-size: 1.5rem;
      color: #333;
    }

    .calendar-nav {
      display: flex;
      gap: 10px;
    }

    .calendar-nav button {
      padding: 8px 16px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s;
    }

    .calendar-nav button:hover {
      background: #5568d3;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .calendar-day-header {
      text-align: center;
      padding: 10px;
      font-weight: 600;
      color: #666;
      font-size: 0.9rem;
    }

    .calendar-day {
      aspect-ratio: 1;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      background: white;
    }

    .calendar-day:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    }

    .calendar-day.other-month {
      background: #f8f9fa;
      color: #adb5bd;
      cursor: default;
    }

    .calendar-day.other-month:hover {
      border-color: #e9ecef;
      box-shadow: none;
    }

    .calendar-day.today {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
    }

    .calendar-day.has-entry {
      border-color: #28a745;
    }

    .calendar-day.has-entry::after {
      content: '';
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: #28a745;
      border-radius: 50%;
    }

    .calendar-day.selected {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .calendar-day-number {
      font-size: 1.1rem;
      font-weight: 500;
      color: #333;
    }

    .calendar-day.other-month .calendar-day-number {
      color: #adb5bd;
    }

    .calendar-day.today .calendar-day-number {
      color: #667eea;
      font-weight: 700;
    }

    /* Modal Styles */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1.2rem;
    }

    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.3s;
    }

    .modal-close:hover {
      background: rgba(255,255,255,0.2);
    }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .entry-content {
      min-height: 200px;
    }

    .entry-content textarea {
      width: 100%;
      min-height: 200px;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
    }

    .entry-content textarea:focus {
      border-color: #667eea;
    }

    .entry-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .entry-actions button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-delete {
      background: #dc3545;
      color: white;
    }

    .btn-delete:hover {
      background: #c82333;
    }

    .btn-cancel {
      background: #6c757d;
      color: white;
    }

    .btn-cancel:hover {
      background: #5a6268;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    /* Summary Section */
    .summary-section {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e9ecef;
    }

    .summary-section h4 {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 10px;
    }

    .summary-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .summary-tag {
      background: #e9ecef;
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 0.85rem;
      color: #555;
    }

    .summary-tag.ai {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
      color: #667eea;
    }

    .day-detail {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #e9ecef;
    }

    .day-detail:last-child {
      border-bottom: none;
    }

    .day-detail h4 {
      font-size: 0.95rem;
      color: #667eea;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-list, .conversation-list {
      list-style: none;
      padding: 0;
    }

    .task-list li {
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .task-list li::before {
      content: '✅';
      font-size: 0.9rem;
    }

    .conversation-list li {
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .conversation-list li.user {
      border-left: 3px solid #667eea;
    }

    .conversation-list li.assistant {
      border-left: 3px solid #28a745;
    }

    .conversation-list .role {
      font-weight: 600;
      margin-right: 8px;
    }

    .conversation-list .role.user {
      color: #667eea;
    }

    .conversation-list .role.assistant {
      color: #28a745;
    }

    .empty-tip {
      color: #999;
      font-size: 0.9rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📅 日历日记</h1>
      <div class="header-nav">
        <a href="/chat">💬 聊天</a>
        <a href="/viz">📊 数据中心</a>
      </div>
    </div>

    <div class="calendar-container">
      <div class="calendar-header">
        <h2 id="currentMonth"></h2>
        <div class="calendar-nav">
          <button onclick="previousMonth()">← 上月</button>
          <button onclick="goToToday()">今天</button>
          <button onclick="nextMonth()">下月 →</button>
        </div>
      </div>

      <div class="calendar-grid">
        <div class="calendar-day-header">日</div>
        <div class="calendar-day-header">一</div>
        <div class="calendar-day-header">二</div>
        <div class="calendar-day-header">三</div>
        <div class="calendar-day-header">四</div>
        <div class="calendar-day-header">五</div>
        <div class="calendar-day-header">六</div>
      </div>

      <div id="calendarDays" class="calendar-grid"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">日记</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="modalContent">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentDate = new Date();
    let selectedDate = null;
    let token = null;
    let entries = {};

    // 获取认证令牌
    function getToken() {
      return localStorage.getItem('ai_partner_token') || '';
    }

    // 自动获取令牌
    async function ensureToken() {
      if (!getToken()) {
        const userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        try {
          const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId }),
          });
          const result = await response.json();
          if (result.success) {
            localStorage.setItem('ai_partner_token', result.data.accessToken);
            token = result.data.accessToken;
          }
        } catch (error) {
          console.error('获取令牌失败:', error);
        }
      } else {
        token = getToken();
      }
    }

    // 渲染日历
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      // 设置月份标题
      const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月',
                         '七月', '八月', '九月', '十月', '十一月', '十二月'];
      document.getElementById('currentMonth').textContent = `${year}年 ${monthNames[month]}`;

      // 获取当月第一天和最后一天
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);

      // 获取第一天是星期几
      const firstDayOfWeek = firstDay.getDay();

      // 获取总天数
      const totalDays = lastDay.getDate();

      // 获取上个月的最后几天
      const prevMonthLastDay = new Date(year, month, 0).getDate();

      const calendarDays = document.getElementById('calendarDays');
      calendarDays.innerHTML = '';

      const today = new Date();
      const todayStr = formatDate(today);

      // 添加上个月的日期
      for (let i = firstDayOfWeek - 1; i >= 0; i--) {
        const day = prevMonthLastDay - i;
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="calendar-day-number">${day}</div>`;
        calendarDays.appendChild(dayDiv);
      }

      // 添加当月的日期
      for (let day = 1; day <= totalDays; day++) {
        const date = new Date(year, month, day);
        const dateStr = formatDate(date);
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';

        // 检查是否是今天
        if (dateStr === todayStr) {
          dayDiv.classList.add('today');
        }

        // 检查是否有日记
        if (entries[dateStr]) {
          dayDiv.classList.add('has-entry');
        }

        // 检查是否被选中
        if (selectedDate && dateStr === formatDate(selectedDate)) {
          dayDiv.classList.add('selected');
        }

        dayDiv.innerHTML = `<div class="calendar-day-number">${day}</div>`;
        dayDiv.onclick = () => openDayModal(date);
        calendarDays.appendChild(dayDiv);
      }

      // 添加下个月的日期
      const remainingDays = 42 - (firstDayOfWeek + totalDays);
      for (let day = 1; day <= remainingDays; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="calendar-day-number">${day}</div>`;
        calendarDays.appendChild(dayDiv);
      }
    }

    // 格式化日期为 YYYY-MM-DD
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // 切换月份
    function previousMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      loadEntries();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      loadEntries();
    }

    function goToToday() {
      currentDate = new Date();
      loadEntries();
    }

    // 加载日记条目
    async function loadEntries() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;

      try {
        const response = await fetch(`/api/calendar/entries?year=${year}&month=${month}`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
        const result = await response.json();
        if (result.success) {
          entries = result.data.entries;
        }
        renderCalendar();
      } catch (error) {
        console.error('加载日记失败:', error);
        entries = {};
        renderCalendar();
      }
    }

    // 打开日期弹窗
    async function openDayModal(date) {
      selectedDate = date;
      const dateStr = formatDate(date);
      const modalOverlay = document.getElementById('modalOverlay');
      const modalContent = document.getElementById('modalContent');
      const modalTitle = document.getElementById('modalTitle');

      modalTitle.textContent = `${dateStr} 的日记`;
      modalOverlay.classList.add('active');
      modalContent.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch(`/api/calendar/entry/${dateStr}`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
        const result = await response.json();

        if (result.success) {
          const entry = result.data.entry;
          const completedTasks = result.data.completedTasks || [];
          const conversations = result.data.conversations || [];

          let html = '';

          // 完成任务列表
          html += '<div class="day-detail">';
          html += '<h4>✅ 完成的任务</h4>';
          if (completedTasks.length > 0) {
            html += '<ul class="task-list">';
            completedTasks.forEach(task => {
              html += `<li>${escapeHtml(task.description)}</li>`;
            });
            html += '</ul>';
          } else {
            html += '<p class="empty-tip">今天没有完成任何任务</p>';
          }
          html += '</div>';

          // 日记内容
          html += '<div class="day-detail">';
          html += '<h4>📝 日记</h4>';
          html += `<div class="entry-content">
            <textarea id="entryTextarea" placeholder="写下今天的记录...">${entry ? entry.content : ''}</textarea>
          </div>`;
          html += '</div>';

          // 对话历史
          html += '<div class="day-detail">';
          html += '<h4>💬 对话历史</h4>';
          if (conversations.length > 0) {
            html += '<ul class="conversation-list">';
            conversations.forEach(conv => {
              const roleClass = conv.role === 'user' ? 'user' : 'assistant';
              const roleName = conv.role === 'user' ? '我' : 'AI';
              html += `<li class="${roleClass}">
                <span class="role ${roleClass}">${roleName}:</span>
                ${escapeHtml(conv.content)}
              </li>`;
            });
            html += '</ul>';
          } else {
            html += '<p class="empty-tip">今天没有对话</p>';
          }
          html += '</div>';

          // 操作按钮
          html += `<div class="entry-actions">
            <button class="btn-save" onclick="saveEntry('${dateStr}')">💾 保存日记</button>
            ${entry ? '<button class="btn-delete" onclick="deleteEntry(\'' + dateStr + '\')">🗑️ 删除</button>' : ''}
            <button class="btn-cancel" onclick="closeModal()">取消</button>
          </div>`;

          modalContent.innerHTML = html;
        } else {
          modalContent.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📝</div>
              <p>暂无记录</p>
            </div>
          `;
        }
      } catch (error) {
        modalContent.innerHTML = `
          <div class="empty-state">
            <p>加载失败：${error.message}</p>
          </div>
        `;
      }
    }

    // 保存日记
    async function saveEntry(dateStr) {
      const textarea = document.getElementById('entryTextarea');
      const content = textarea.value.trim();

      if (!content) {
        alert('请输入日记内容');
        return;
      }

      try {
        const response = await fetch(`/api/calendar/entry/${dateStr}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
          },
          body: JSON.stringify({ content }),
        });
        const result = await response.json();

        if (result.success) {
          alert('保存成功！');
          entries[dateStr] = result.data.entry;
          renderCalendar();
          openDayModal(selectedDate);
        } else {
          alert('保存失败：' + (result.error?.message || '未知错误'));
        }
      } catch (error) {
        alert('保存失败：' + error.message);
      }
    }

    // 删除日记
    async function deleteEntry(dateStr) {
      if (!confirm('确定要删除这篇日记吗？')) return;

      try {
        const response = await fetch(`/api/calendar/entry/${dateStr}`, {
          method: 'DELETE',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });
        const result = await response.json();

        if (result.success) {
          alert('删除成功！');
          delete entries[dateStr];
          renderCalendar();
          closeModal();
        } else {
          alert('删除失败：' + (result.error?.message || '未知错误'));
        }
      } catch (error) {
        alert('删除失败：' + error.message);
      }
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      selectedDate = null;
    }

    // 转义 HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 点击遮罩关闭
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        closeModal();
      }
    });

    // 键盘关闭
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // 初始化
    ensureToken().then(() => {
      loadEntries();
    });
  </script>
</body>
</html>
