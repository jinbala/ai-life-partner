<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日历日记 - AI 人生合伙人</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    .header h1 { font-size: 1.5rem; }
    .header-nav a {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 0.9rem;
      margin-left: 10px;
      transition: background 0.3s;
    }
    .header-nav a:hover { background: rgba(255,255,255,0.3); }
    .calendar-container { padding: 30px; }

    /* 顶部统计卡片 */
    .month-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }
    .stat-card {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border-radius: 12px;
      padding: 15px 20px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .stat-card.accent {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 0.85rem;
      opacity: 0.8;
    }
    .stat-card.accent .stat-label { opacity: 0.9; }

    /* 快捷操作栏 */
    .quick-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .quick-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
    }
    .quick-btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .quick-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }
    .quick-btn-secondary {
      background: #f1f3f5;
      color: #333;
    }
    .quick-btn-secondary:hover {
      background: #e9ecef;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .calendar-nav button {
      padding: 8px 16px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-left: 5px;
      transition: background 0.3s;
    }
    .calendar-nav button:hover { background: #5568d3; }
    .quick-jump input {
      padding: 8px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-left: 10px;
      outline: none;
      transition: border-color 0.3s;
    }
    .quick-jump input:focus { border-color: #667eea; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
    }
    .calendar-day-header {
      text-align: center;
      padding: 12px;
      font-weight: 600;
      color: #666;
      font-size: 0.9rem;
    }

    /* 日历格子增强 */
    .calendar-day {
      min-height: 140px;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
      position: relative;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: white;
    }
    .calendar-day:hover {
      border-color: #667eea;
      box-shadow: 0 5px 20px rgba(102,126,234,0.2);
      transform: translateY(-2px);
    }
    .calendar-day.today {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102,126,234,0.05) 0%, rgba(118,75,162,0.05) 100%);
    }
    .calendar-day.has-entry {
      border-color: #28a745;
      background: linear-gradient(135deg, rgba(40,167,69,0.05) 0%, rgba(40,167,69,0.02) 100%);
    }
    .calendar-day.other-month {
      background: #f8f9fa;
      opacity: 0.6;
      cursor: default;
    }
    .calendar-day.other-month:hover {
      border-color: #e9ecef;
      box-shadow: none;
      transform: none;
    }

    .calendar-day .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .calendar-day .day-number {
      font-weight: 700;
      font-size: 1.1rem;
      color: #333;
    }
    .calendar-day.today .day-number {
      color: #667eea;
      background: white;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .calendar-day .day-streak {
      font-size: 0.7rem;
      background: linear-gradient(135deg, #ff9800 0%, #ff5722 100%);
      color: white;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }

    /* 内容预览区 */
    .calendar-day .day-preview {
      flex: 1;
      font-size: 0.75rem;
      color: #666;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* 数据统计行 */
    .calendar-day .day-stats {
      display: flex;
      gap: 8px;
      font-size: 0.7rem;
      color: #999;
    }
    .calendar-day .day-stat {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* 情绪和指示器 */
    .calendar-day .day-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .calendar-day .day-mood {
      font-size: 1.3rem;
    }
    .calendar-day .day-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #28a745;
    }
    .calendar-day.has-tasks .day-indicator {
      background: #2196f3;
    }
    .calendar-day.has-both .day-indicator {
      background: linear-gradient(135deg, #28a745 0%, #2196f3 100%);
    }

    /* 图例 */
    .legend {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e9ecef;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #666;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .legend-dot.green { background: #28a745; }
    .legend-dot.blue { background: #2196f3; }
    .legend-dot.gradient {
      background: linear-gradient(135deg, #28a745 0%, #2196f3 100%);
    }

    /* Modal 增强 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      width: 90%;
      max-width: 650px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 { font-size: 1.2rem; }
    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); }
    .modal-body {
      padding: 25px;
      overflow-y: auto;
      flex: 1;
    }

    .day-section {
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e9ecef;
    }
    .day-section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .day-section h4 {
      font-size: 1rem;
      color: #667eea;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 情绪选择器 */
    .mood-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .mood-option {
      width: 45px;
      height: 45px;
      border: 2px solid #e9ecef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      transition: all 0.3s;
    }
    .mood-option:hover {
      border-color: #667eea;
      transform: scale(1.1);
    }
    .mood-option.selected {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102,126,234,0.15) 0%, rgba(118,75,162,0.15) 100%);
      transform: scale(1.1);
    }

    .word-count {
      font-size: 0.8rem;
      color: #999;
      text-align: right;
      margin-top: 8px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      line-height: 1.6;
    }
    textarea:focus {
      border-color: #667eea;
      outline: none;
    }

    .entry-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .entry-actions button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }
    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }
    .btn-delete {
      background: #fff;
      color: #dc3545;
      border: 2px solid #dc3545 !important;
    }
    .btn-delete:hover {
      background: #dc3545;
      color: white;
    }
    .btn-cancel {
      background: #e9ecef;
      color: #666;
    }
    .btn-cancel:hover {
      background: #dee2e6;
    }
    .btn-generate {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(17,153,142,0.4);
    }
    .btn-ai-polish {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }
    .btn-ai-polish:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(240,147,251,0.4);
    }
    .btn-ai-expand {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }
    .btn-ai-expand:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(79,172,254,0.4);
    }
    }

    .task-list, .conversation-list {
      list-style: none;
    }
    .task-list li {
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .task-list li::before {
      content: '✅';
    }
    .conversation-list li {
      padding: 10px 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .conversation-list li.user {
      border-left: 3px solid #667eea;
    }
    .conversation-list li.assistant {
      border-left: 3px solid #28a745;
    }
    .empty-tip {
      color: #999;
      font-size: 0.9rem;
      font-style: italic;
      padding: 15px;
      text-align: center;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    /* 骨架屏动画 */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Mobile Responsive */
    @media (max-width: 1024px) {
      .calendar-grid { gap: 8px; }
      .calendar-day { min-height: 110px; padding: 8px; }
      .calendar-day .day-preview { -webkit-line-clamp: 1; }
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      .container { border-radius: 12px; }
      .header { padding: 15px 20px; flex-direction: column; text-align: center; }
      .header h1 { font-size: 1.2rem; }
      .header-nav { display: flex; flex-wrap: wrap; justify-content: center; }
      .header-nav a { margin: 5px; }
      .calendar-container { padding: 15px; }
      .month-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 12px; }
      .stat-value { font-size: 1.5rem; }
      .calendar-header { flex-direction: column; align-items: stretch; }
      .calendar-nav { display: flex; flex-wrap: wrap; justify-content: center; }
      .calendar-nav button { margin: 5px; }
      .quick-jump input { margin-left: 0; width: 100%; margin-top: 10px; }
      .calendar-grid { gap: 5px; }
      .calendar-day { min-height: 80px; padding: 6px; }
      .calendar-day .day-preview { display: none; }
      .calendar-day .day-stats { display: none; }
      .calendar-day .day-footer { justify-content: flex-end; }
      .legend { justify-content: center; }
      .modal { width: 95%; max-height: 95vh; }
      .modal-header { padding: 15px; }
      .modal-body { padding: 15px; }
      .entry-actions { flex-direction: column; }
      .entry-actions button { width: 100%; }
      .mood-selector { flex-wrap: wrap; }
      .mood-option { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📅 日历日记</h1>
      <div class="header-nav">
        <a href="/chat">💬 聊天</a>
        <a href="/viz">📊 数据</a>
      </div>
    </div>

    <div class="calendar-container">
      <!-- 月份统计卡片 -->
      <div class="month-stats" id="monthStats">
        <div class="stat-card">
          <div class="stat-value" id="statTotalDays">0</div>
          <div class="stat-label">已写天数</div>
        </div>
        <div class="stat-card accent">
          <div class="stat-value" id="statCurrentStreak">0</div>
          <div class="stat-label">连续天数 🔥</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTasks">0</div>
          <div class="stat-label">本月任务</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statWords">0</div>
          <div class="stat-label">本月字数</div>
        </div>
      </div>

      <!-- 快捷操作 -->
      <div class="quick-actions">
        <button class="quick-btn quick-btn-primary" onclick="openTodayModal()">
          ✏️ 写今天
        </button>
        <button class="quick-btn quick-btn-secondary" onclick="generateToday()">
          ✨ AI 生成今天
        </button>
        <button class="quick-btn quick-btn-secondary" onclick="goToToday()">
          📍 回到今天
        </button>
      </div>

      <div class="calendar-header">
        <h2 id="monthTitle"></h2>
        <div class="calendar-nav">
          <button onclick="prevMonth()">← 上月</button>
          <button onclick="goToToday()">今天</button>
          <button onclick="nextMonth()">下月 →</button>
          <div class="quick-jump">
            <input type="date" id="datePicker" onchange="goToDate(this.value)" />
          </div>
        </div>
      </div>

      <div class="calendar-grid" id="calendar">
        <div class="calendar-day-header">日</div>
        <div class="calendar-day-header">一</div>
        <div class="calendar-day-header">二</div>
        <div class="calendar-day-header">三</div>
        <div class="calendar-day-header">四</div>
        <div class="calendar-day-header">五</div>
        <div class="calendar-day-header">六</div>
      </div>

      <!-- 图例 -->
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot green"></div>
          <span>有日记</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot blue"></div>
          <span>有任务</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot gradient"></div>
          <span>日记 + 任务</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">日记</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalContent">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    console.log('[Calendar] 页面初始化');
    let currentDate = new Date();
    let selectedDate = null;
    let token = null;
    let entries = {};
    let tasksByDate = {};
    let currentStreak = 0;

    // 获取令牌
    function getToken() {
      return localStorage.getItem('ai_partner_token') || '';
    }

    // 自动获取令牌
    async function ensureToken() {
      if (!getToken()) {
        const userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        try {
          const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId }),
          });
          const result = await response.json();
          if (result.success) {
            localStorage.setItem('ai_partner_token', result.data.accessToken);
            token = result.data.accessToken;
          }
        } catch (error) {
          console.error('获取令牌失败:', error);
        }
      } else {
        token = getToken();
      }
    }

    // 渲染日历
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
      document.getElementById('monthTitle').textContent = year + '年 ' + monthNames[month];

      const cal = document.getElementById('calendar');
      cal.querySelectorAll('.calendar-day').forEach(function(d) { d.remove(); });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const firstDayOfWeek = firstDay.getDay();
      const totalDays = lastDay.getDate();
      const prevMonthLastDay = new Date(year, month, 0).getDate();
      const today = new Date();
      const todayStr = formatDate(today);

      // 计算连续天数
      calculateStreak(todayStr);

      // 上个月日期
      for (let i = firstDayOfWeek - 1; i >= 0; i--) {
        const day = prevMonthLastDay - i;
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = '<div class="day-number">' + day + '</div>';
        cal.appendChild(dayDiv);
      }

      // 当月日期
      for (let day = 1; day <= totalDays; day++) {
        const date = new Date(year, month, day);
        const dateStr = formatDate(date);
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';

        if (dateStr === todayStr) dayDiv.classList.add('today');

        const hasEntry = !!entries[dateStr];
        const hasTasks = tasksByDate[dateStr] && tasksByDate[dateStr] > 0;

        if (hasEntry) dayDiv.classList.add('has-entry');
        if (hasTasks) dayDiv.classList.add('has-tasks');
        if (hasEntry && hasTasks) dayDiv.classList.add('has-both');

        // 构建内容
        let html = '<div class="day-header">';
        html += '<div class="day-number">' + day + '</div>';

        // 连续天数标记（仅今天和最近）
        if (dateStr === todayStr && currentStreak > 1) {
          html += '<div class="day-streak">🔥' + currentStreak + '天</div>';
        }
        html += '</div>';

        // 日记摘要
        if (hasEntry) {
          const entry = entries[dateStr];
          const content = entry.content || '';
          const mood = entry.mood;
          const moodEmojis = {
            'great': '😊', 'good': '🙂', 'neutral': '😐',
            'bad': '😔', 'terrible': '😫'
          };

          const preview = content.length > 40 ? content.substring(0, 40) + '...' : content;
          html += '<div class="day-preview">' + escapeHtml(preview) + '</div>';

          if (mood && moodEmojis[mood]) {
            html += '<div class="day-footer"><div class="day-mood">' + moodEmojis[mood] + '</div>';
          } else {
            html += '<div class="day-footer">';
          }
        } else {
          html += '<div class="day-preview" style="color:#ccc;font-style:italic;">点击写日记...</div>';
          html += '<div class="day-footer">';
        }

        // 数据统计
        html += '<div class="day-stats">';
        if (hasTasks) {
          html += '<div class="day-stat">📋 ' + tasksByDate[dateStr] + '任务</div>';
        }
        if (hasEntry) {
          const wordCount = entries[dateStr].content ? entries[dateStr].content.length : 0;
          html += '<div class="day-stat">📝 ' + wordCount + '字</div>';
        }
        html += '</div>';

        // 指示器
        html += '<div class="day-indicator"></div>';
        html += '</div>'; // close day-footer

        dayDiv.innerHTML = html;
        dayDiv.onclick = function(e) {
          if (!e.target.classList.contains('day-indicator')) {
            openDayModal(date);
          }
        };
        cal.appendChild(dayDiv);
      }

      // 下个月日期
      const remaining = 42 - (firstDayOfWeek + totalDays);
      for (let day = 1; day <= remaining; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = '<div class="day-number">' + day + '</div>';
        cal.appendChild(dayDiv);
      }

      // 更新统计卡片
      updateMonthStats();
    }

    // 计算连续天数
    function calculateStreak(todayStr) {
      let streak = 0;
      const today = new Date();

      for (let i = 0; i < 365; i++) {
        const checkDate = new Date(today);
        checkDate.setDate(checkDate.getDate() - i);
        const dateStr = formatDate(checkDate);

        if (entries[dateStr]) {
          streak++;
        } else if (i > 0) {
          // 跳过今天没写的情况
          break;
        }
      }

      currentStreak = streak;
    }

    // 更新月份统计

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;

      let totalDays = 0;
      let totalWords = 0;
      let totalTasks = 0;

      // 计算本月日记天数和字数
      for (const dateStr in entries) {
        if (dateStr.startsWith(year + '-' + String(month).padStart(2, '0'))) {
          totalDays++;
          if (entries[dateStr].content) {
            totalWords += entries[dateStr].content.length;
          }
        }
      }

      // 计算本月任务
      for (const dateStr in tasksByDate) {
        if (dateStr.startsWith(year + '-' + String(month).padStart(2, '0'))) {
          totalTasks += tasksByDate[dateStr];
        }
      }

      document.getElementById('statTotalDays').textContent = totalDays;
      document.getElementById('statCurrentStreak').textContent = currentStreak;
      document.getElementById('statTasks').textContent = totalTasks;
      document.getElementById('statWords').textContent = totalWords;
    }

      return year + '-' + month + '-' + day;

    // 保存日记
    async function saveEntry(dateStr) {
      const textarea = document.getElementById('entryTextarea');
      const content = textarea.value.trim();

      if (!content) {
        alert('请输入日记内容');
        return;
      }

      // 获取选中的情绪
      const selectedMood = document.querySelector('.mood-option.selected');
      const mood = selectedMood ? selectedMood.getAttribute('data-mood') : null;

      try {
        const response = await fetch('/api/calendar/entry/' + dateStr, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
          },
          body: JSON.stringify({ content, mood }),
        });
        const result = await response.json();

        if (result.success) {
          alert('保存成功！');
          entries[dateStr] = { content: content, mood: mood };
          renderCalendar();
          openDayModal(selectedDate);
        } else {
          alert('保存失败：' + (result.error?.message || '未知错误'));
        }
      } catch (error) {
        alert('保存失败：' + error.message);
      }
    }

      if (!confirm('确定要删除这篇日记吗？')) return;

      try {
        const response = await fetch('/api/calendar/entry/' + dateStr, {
          method: 'DELETE',
          headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        });
        const result = await response.json();

        if (result.success) {
          alert('删除成功！');
          delete entries[dateStr];
          renderCalendar();
          closeModal();
        } else {
          alert('删除失败：' + (result.error?.message || '未知错误'));
        }
      } catch (error) {
        alert('删除失败：' + error.message);
      }
    }

      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('modal').addEventListener('click', function(e) {
