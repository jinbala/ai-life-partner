<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 外置大脑</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      gap: 20px;
      flex-direction: row;
    }

    .main-container {
      display: flex;
      gap: 20px;
      max-width: 1400px;
      width: 100%;
      height: 85vh;
    }

    .chat-container {
      flex: 1;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 500px;
    }

    .calendar-panel {
      width: 350px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .chat-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .chat-header p {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 5px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
      align-items: flex-start;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin-right: 10px;
    }

    .message.user .message-avatar {
      background: #e9ecef;
      margin-left: 10px;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.assistant .message-content {
      background: white;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .chat-input-container {
      padding: 20px;
      background: white;
      border-top: 1px solid #e9ecef;
    }

    .chat-input-wrapper {
      display: flex;
      gap: 10px;
    }

    #messageInput {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    #messageInput:focus {
      border-color: #667eea;
    }

    #sendBtn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #sendBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    #sendBtn:active {
      transform: translateY(0);
    }

    #sendBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #adb5bd;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .command-list {
      margin-top: 10px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .command-list details {
      cursor: pointer;
    }

    .command-list summary {
      color: #667eea;
      font-weight: 500;
    }

    .command-list ul {
      margin-top: 10px;
      margin-left: 20px;
    }

    .command-list li {
      margin: 5px 0;
      color: #666;
    }

    .command-list code {
      background: #e9ecef;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }

    .nav-links {
      display: flex;
      gap: 10px;
    }

    .nav-link {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.3s;
    }

    .nav-link:hover {
      background: rgba(255,255,255,0.3);
    }

    .calendar-panel-header {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .calendar-mini {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      font-size: 0.85rem;
    }

    .calendar-mini .day-header {
      text-align: center;
      font-weight: 600;
      color: #666;
      padding: 5px;
    }

    .calendar-mini .day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .calendar-mini .day:hover {
      background: #f0f0f0;
    }

    .calendar-mini .day.today {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 600;
    }

    .calendar-mini .day.has-activity {
      background: #e8f5e9;
      border: 1px solid #4caf50;
    }

    .calendar-mini .day.other-month {
      color: #ccc;
      cursor: default;
    }

    .calendar-mini .day.selected {
      background: #667eea;
      color: white;
    }

    .mini-nav {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    .mini-nav button {
      flex: 1;
      padding: 8px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.3s;
    }

    .mini-nav button:hover {
      background: #5568d3;
    }

    .day-summary {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e9ecef;
      flex: 1;
      overflow-y: auto;
    }

    .day-summary h4 {
      font-size: 0.9rem;
      color: #667eea;
      margin-bottom: 10px;
    }

    .summary-item {
      padding: 8px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }

    .summary-item .date {
      font-weight: 600;
      color: #333;
    }

    .summary-item .count {
      color: #666;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="chat-container">
      <div class="chat-header">
        <h1>🤖 AI 人生合伙人</h1>
        <p>用第一性原理驱动的进化式人生助手</p>
      </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          你好！我是你的 AI 人生合伙人。<br><br>
          我可以帮你：<br>
          • 分析决策，拆解底层逻辑<br>
          • 制定目标，追踪执行进度<br>
          • 日常复盘，持续进化<br><br>
          有什么想聊的吗？
          <div class="command-list">
            <details>
              <summary>📖 可用命令</summary>
              <ul>
                <li><code>/help</code> - 显示帮助</li>
                <li><code>/goals</code> - 查看目标</li>
                <li><code>/tasks</code> - 查看任务</li>
                <li><code>/portrait</code> - 查看画像</li>
                <li><code>/add-task</code> - 添加任务</li>
              </ul>
            </details>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-input-container">
      <div class="chat-input-wrapper">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn">发送</button>
      </div>
    </div>
    </div>

    <!-- 日历侧边栏 -->
    <div class="calendar-panel">
      <div class="calendar-panel-header" style="flex-direction:column;gap:10px;align-items:flex-start;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:1.1rem;font-weight:600;color:#333;">📅 日历</span>
        </div>
        <div class="nav-links" style="margin:0;">
          <a href="/calendar.html" class="nav-link" style="font-size:0.75rem;padding:4px 8px;background:#ff9800;color:#fff;">📝 日记</a>
          <a href="/viz.html" class="nav-link" style="font-size:0.75rem;padding:4px 8px;background:#ff9800;color:#fff;">📊 数据中心</a>
          <a href="/" class="nav-link" style="font-size:0.75rem;padding:4px 8px;background:#ff9800;color:#fff;">💬 聊天</a>
        </div>
      </div>

      <div class="mini-nav">
        <button onclick="prevMonth()">上月</button>
        <button id="currentMonthLabel" style="background:#e9ecef;color:#333;cursor:default;flex:0.8;">4 月</button>
        <button onclick="nextMonth()">下月</button>
      </div>

      <div class="mini-nav" style="margin-top:8px;">
        <button onclick="goToToday()" style="background:#28a745;">今天</button>
      </div>

      <div id="miniCalendar" class="calendar-mini">
        <!-- 日历由 JS 生成 -->
      </div>

      <div class="day-summary" id="daySummary">
        <h4>当日概况</h4>
        <p style="color:#999;font-size:0.85rem;">点击日期查看详情</p>
      </div>
    </div>
  </div>

  <script>
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // 生成用户 ID（本地存储）
    function getUserId() {
      let userId = localStorage.getItem('ai_partner_user_id');
      if (!userId) {
        userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('ai_partner_user_id', userId);
      }
      return userId;
    }

    // 获取认证令牌
    function getToken() {
      return localStorage.getItem('ai_partner_token') || '';
    }

    // 自动获取令牌（如果还没有）
    async function ensureToken() {
      if (!getToken()) {
        try {
          const userId = getUserId();
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ openId: userId }),
          });
          const result = await response.json();
          if (result.accessToken) {
            localStorage.setItem('ai_partner_token', result.accessToken);
            localStorage.setItem('ai_partner_refresh_token', result.refreshToken);
            console.log('[Auth] 自动获取令牌成功');
          }
        } catch (error) {
          console.error('[Auth] 自动获取令牌失败:', error);
        }
      }
    }

    // 生成会话 ID（本地存储）
    function getSessionId() {
      let sessionId = localStorage.getItem('ai_partner_session_id');
      if (!sessionId) {
        sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('ai_partner_session_id', sessionId);
      }
      return sessionId;
    }

    // 添加消息到聊天
    function addMessage(content, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

      messageDiv.innerHTML = `
        <div class="message-avatar">${isUser ? '👤' : '🤖'}</div>
        <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
      `;

      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 显示输入指示器
    function showTypingIndicator() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerHTML = `
        <div class="message-avatar">🤖</div>
        <div class="message-content">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      chatMessages.appendChild(typingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 移除输入指示器
    function removeTypingIndicator() {
      const typingDiv = document.getElementById('typingIndicator');
      if (typingDiv) {
        typingDiv.remove();
      }
    }

    // 发送消息
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      // 禁用输入
      messageInput.disabled = true;
      sendBtn.disabled = true;

      // 显示用户消息
      addMessage(message, true);
      messageInput.value = '';

      // 显示输入指示器
      showTypingIndicator();

      try {
        // 发送到聊天 API
        const token = getToken();
        const response = await fetch('/api/chat/message', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
          },
          body: JSON.stringify({
            userId: getUserId(),
            sessionId: getSessionId(),
            message: message,
          }),
        });

        const data = await response.json();
        removeTypingIndicator();

        if (data.success) {
          addMessage(data.data.message, false);
        } else {
          addMessage(`错误：${data.error?.message || data.error}`, false);
        }
      } catch (error) {
        removeTypingIndicator();
        addMessage(`请求失败：${error.message}`, false);
      } finally {
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    // 事件监听
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // 页面加载时获取令牌
    ensureToken();

    // 页面加载完成后聚焦输入框
    messageInput.focus();

    // ========== 日历功能 ==========
    let calendarDate = new Date();
    let calendarEntries = {};

    // 渲染迷你日历
    function renderMiniCalendar() {
      const year = calendarDate.getFullYear();
      const month = calendarDate.getMonth();
      const container = document.getElementById('miniCalendar');

      if (!container) return;

      // 更新月份标签
      const monthLabel = document.getElementById('currentMonthLabel');
      if (monthLabel) {
        monthLabel.textContent = `${month + 1}月`;
      }

      // 星期标题
      const headers = ['日', '一', '二', '三', '四', '五', '六'];
      let html = headers.map(h => `<div class="day-header">${h}</div>`).join('');

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const firstDayOfWeek = firstDay.getDay();
      const totalDays = lastDay.getDate();
      const prevMonthLastDay = new Date(year, month, 0).getDate();

      const today = new Date();
      const todayStr = formatDate(today);

      // 上个月日期
      for (let i = firstDayOfWeek - 1; i >= 0; i--) {
        html += `<div class="day other-month">${prevMonthLastDay - i}</div>`;
      }

      // 当月日期
      for (let day = 1; day <= totalDays; day++) {
        const date = new Date(year, month, day);
        const dateStr = formatDate(date);
        let classes = 'day';

        if (dateStr === todayStr) classes += ' today';
        if (calendarEntries[dateStr]) classes += ' has-activity';

        html += `<div class="${classes}" onclick="selectDay('${dateStr}')">${day}</div>`;
      }

      // 下个月日期
      const remaining = 42 - (firstDayOfWeek + totalDays);
      for (let day = 1; day <= remaining; day++) {
        html += `<div class="day other-month">${day}</div>`;
      }

      container.innerHTML = html;
    }

    // 格式化日期
    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // 切换月份
    function prevMonth() {
      calendarDate.setMonth(calendarDate.getMonth() - 1);
      loadCalendarEntries();
    }

    function nextMonth() {
      calendarDate.setMonth(calendarDate.getMonth() + 1);
      loadCalendarEntries();
    }

    function goToToday() {
      calendarDate = new Date();
      loadCalendarEntries();
    }

    // 加载日历条目
    async function loadCalendarEntries() {
      const year = calendarDate.getFullYear();
      const month = calendarDate.getMonth() + 1;

      try {
        const response = await fetch(`/api/calendar/entries?year=${year}&month=${month}`, {
          headers: getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {},
        });
        const result = await response.json();
        if (result.success) {
          calendarEntries = result.data.entries;
        }
        renderMiniCalendar();
      } catch (error) {
        console.error('加载日历失败:', error);
      }
    }

    // 选择日期
    async function selectDay(dateStr) {
      const summary = document.getElementById('daySummary');
      if (!summary) return;

      summary.innerHTML = '<p style="color:#999;">加载中...</p>';

      try {
        const response = await fetch(`/api/calendar/entry/${dateStr}`, {
          headers: getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {},
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const result = await response.json();

        if (result.success) {
          const { entry, completedTasks, conversations } = result.data;

          let html = `<h4>${dateStr} 概况</h4>`;

          // 完成任务
          html += '<div class="summary-item">';
          html += `<div class="date">✅ 完成任务</div>`;
          html += `<div class="count">${completedTasks?.length || 0} 项</div>`;
          if (completedTasks?.length > 0) {
            completedTasks.forEach(t => {
              html += `<div style="font-size:0.8rem;color:#666;margin-top:4px;">• ${escapeHtml(t.description)}</div>`;
            });
          }
          html += '</div>';

          // 对话数量
          html += '<div class="summary-item">';
          html += `<div class="date">💬 对话</div>`;
          html += `<div class="count">${conversations?.length || 0} 条</div>`;
          if (conversations?.length > 0) {
            html += '<div style="font-size:0.8rem;color:#666;margin-top:4px;max-height:100px;overflow-y:auto;">';
            conversations.slice(0, 5).forEach(c => {
              html += `<div>• ${c.role === 'user' ? '我' : 'AI'}: ${escapeHtml(c.content.substring(0, 50))}...</div>`;
            });
            if (conversations.length > 5) {
              html += `<div style="color:#999;">还有 ${conversations.length - 5} 条对话...</div>`;
            }
            html += '</div>';
          }
          html += '</div>';

          // 日记
          html += '<div class="summary-item">';
          html += `<div class="date">📝 日记</div>`;
          if (entry) {
            html += `<div style="font-size:0.85rem;color:#333;margin-top:8px;padding:8px;background:#f8f9fa;border-radius:8px;">${escapeHtml(entry.content)}</div>`;
          } else {
            html += `<div class="count">无记录</div>`;
            html += `<div style="font-size:0.8rem;color:#999;margin-top:4px;">每日 23:00 自动生成总结，也可手动编辑</div>`;
          }
          html += '</div>';

          // 查看详情按钮
          html += `<a href="/calendar.html" style="display:block;text-align:center;color:#667eea;text-decoration:none;padding:8px;font-size:0.85rem;margin-top:10px;">查看完整日历 →</a>`;

          summary.innerHTML = html;
        } else {
          summary.innerHTML = `<p style="color:#f44336;">加载失败：${result.error?.message || '未知错误'}</p>`;
        }
      } catch (error) {
        console.error('加载日历详情失败:', error);
        summary.innerHTML = `<p style="color:#f44336;">加载失败：${error.message}</p>`;
      }
    }

    // 转义 HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      if (!text) return '';
      div.textContent = text;
      return div.innerHTML;
    }

    // 初始化日历
    console.log('[Calendar] 页面初始化');
    ensureToken().then(() => {
      console.log('[Calendar] Token 初始化完成');
      loadCalendarEntries();
    });
  </script>
</body>
</html>
